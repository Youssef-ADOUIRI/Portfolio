<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23121212'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Inter,system-ui,sans-serif' font-weight='600' font-size='26' fill='white'%3EYA%3C/text%3E%3C/svg%3E" />
  <title>Youssef Adouiri Alaoui — Data Scientist</title>
  <meta name="description" content="Personal portfolio of Youssef Adouiri Alaoui — Junior Data Scientist & Industrial Management Engineer. Bridging Deep Learning, Supply Chain, and Strategy." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            neutral: {
              925: '#121212',
              850: '#1a1a1a',
              750: '#2a2a2a',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Smooth fade-in on scroll */
    .fade-section {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .fade-section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Subtle link underline animation */
    .link-underline {
      position: relative;
    }
    .link-underline::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: currentColor;
      transition: width 0.3s ease;
    }
    .link-underline:hover::after {
      width: 100%;
    }

    /* Card hover lift */
    .card-hover {
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }
    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* Image placeholder shimmer */
    .img-placeholder {
      background: linear-gradient(110deg, #1a1a1a 8%, #252525 18%, #1a1a1a 33%);
      background-size: 200% 100%;
      animation: shimmer 1.8s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Dot pulse for "current status" */
    .pulse-dot {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>

<body class="bg-neutral-925 text-neutral-300 font-sans antialiased selection:bg-white selection:text-black">

  <!-- ═══════════════════════════════════════════ -->
  <!-- HERO                                        -->
  <!-- ═══════════════════════════════════════════ -->
  <header class="min-h-screen flex items-center justify-center px-6">
    <div class="max-w-2xl w-full fade-section">
      <h1 id="hero-name" class="text-4xl sm:text-5xl md:text-6xl font-bold text-white tracking-tight leading-[1.1]"></h1>
      <p id="hero-title" class="mt-4 text-base sm:text-lg text-neutral-400 font-light leading-relaxed"></p>
      <p id="hero-tagline" class="mt-2 text-sm text-neutral-500 italic tracking-wide"></p>
      <div id="hero-links" class="mt-8 flex flex-wrap gap-6 text-sm text-neutral-400"></div>
      <div class="mt-16 text-neutral-600 text-xs tracking-widest uppercase">Scroll ↓</div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════ -->
  <!-- UPDATES / CURRENT STATUS                    -->
  <!-- ═══════════════════════════════════════════ -->
  <section class="px-6 py-24 md:py-32">
    <div class="max-w-2xl mx-auto fade-section">
      <h2 class="text-xs tracking-[0.3em] uppercase text-neutral-500 mb-10">Now</h2>
      <div id="updates-list" class="space-y-6"></div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SELECTED PROJECTS                           -->
  <!-- ═══════════════════════════════════════════ -->
  <section class="px-6 py-24 md:py-32">
    <div class="max-w-4xl mx-auto fade-section">
      <h2 class="text-xs tracking-[0.3em] uppercase text-neutral-500 mb-10">Selected Projects</h2>
      <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEADERSHIP & ACTIVITIES                     -->
  <!-- ═══════════════════════════════════════════ -->
  <section class="px-6 py-24 md:py-32">
    <div class="max-w-4xl mx-auto fade-section">
      <h2 class="text-xs tracking-[0.3em] uppercase text-neutral-500 mb-10">Leadership &amp; Activities</h2>
      <div id="leadership-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════ -->
  <!-- TECHNICAL SKILLS                            -->
  <!-- ═══════════════════════════════════════════ -->
  <section class="px-6 py-24 md:py-32">
    <div class="max-w-2xl mx-auto fade-section">
      <h2 class="text-xs tracking-[0.3em] uppercase text-neutral-500 mb-10">Skills</h2>
      <div id="skills-list" class="space-y-6 text-sm"></div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════ -->
  <!-- FOOTER                                      -->
  <!-- ═══════════════════════════════════════════ -->
  <footer class="px-6 py-16 border-t border-neutral-800">
    <div class="max-w-2xl mx-auto flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <p id="footer-copyright" class="text-neutral-600 text-xs"></p>
      <div id="footer-links" class="flex gap-6 text-xs text-neutral-500"></div>
    </div>
  </footer>


  <!-- ═══════════════════════════════════════════ -->
  <!-- DATA RENDERING ENGINE                       -->
  <!-- ═══════════════════════════════════════════ -->
  <script>
    /**
     * Escape HTML entities to prevent XSS when injecting user-provided text.
     */
    function esc(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    /**
     * Fetch data.json and render every section.
     */
    async function renderSite() {
      let data;
      try {
        const res = await fetch('./data.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (err) {
        document.body.innerHTML = `
          <div class="min-h-screen flex items-center justify-center text-neutral-500 px-6 text-center">
            <p>Could not load <code>data.json</code>.<br/>Make sure both files are served from the same origin.<br/><small>${esc(err.message)}</small></p>
          </div>`;
        return;
      }

      // ── Hero ──────────────────────────────
      const hero = data.hero;
      document.getElementById('hero-name').innerHTML = esc(hero.name).replace(/\n/g, '<br />');
      document.getElementById('hero-title').textContent = hero.title;
      document.getElementById('hero-tagline').textContent = hero.tagline;

      const heroLinksEl = document.getElementById('hero-links');
      heroLinksEl.innerHTML = hero.links.map(link => {
        const attrs = link.external ? ' target="_blank" rel="noopener"' : '';
        return `<a href="${esc(link.url)}"${attrs} class="link-underline hover:text-white transition-colors">${esc(link.label)} ↗</a>`;
      }).join('');

      // ── Updates ───────────────────────────
      const updatesEl = document.getElementById('updates-list');
      updatesEl.innerHTML = data.updates.map(u => {
        const dotClass = u.active
          ? 'bg-emerald-500 pulse-dot'
          : 'bg-neutral-600';
        return `
          <div class="flex items-start gap-4">
            <span class="mt-1.5 w-2 h-2 rounded-full ${dotClass} flex-shrink-0"></span>
            <div>
              <p class="text-white text-sm font-medium">${esc(u.title)}</p>
              <p class="text-neutral-500 text-sm mt-0.5">${esc(u.subtitle)}</p>
            </div>
          </div>`;
      }).join('');

      // ── Projects ──────────────────────────
      const projectsEl = document.getElementById('projects-grid');
      projectsEl.innerHTML = data.projects.map(p => {
        const tagsHtml = p.tags.map(t => {
          if (t.color === 'green') {
            return `<span class="text-xs bg-emerald-900/40 text-emerald-400 px-2.5 py-1 rounded-full">${esc(t.label)}</span>`;
          }
          return `<span class="text-xs bg-neutral-750 text-neutral-400 px-2.5 py-1 rounded-full">${esc(t.label)}</span>`;
        }).join('');

        return `
          <div class="bg-neutral-850 border border-neutral-800 rounded-2xl p-6 card-hover">
            <div class="flex items-center gap-2 mb-3">${tagsHtml}</div>
            <h3 class="text-white text-base font-semibold leading-snug">${esc(p.title)}</h3>
            <p class="text-neutral-500 text-sm mt-2 leading-relaxed">${esc(p.description)}</p>
          </div>`;
      }).join('');

      // ── Leadership ────────────────────────
      const leadershipEl = document.getElementById('leadership-grid');
      leadershipEl.innerHTML = data.leadership.map(l => `
        <div class="bg-neutral-850 border border-neutral-800 rounded-2xl overflow-hidden card-hover">
          <div class="w-full aspect-[4/3] img-placeholder relative">
            <img
              src="${esc(l.image)}"
              alt="${esc(l.imageAlt)}"
              class="w-full h-full object-cover"
              loading="lazy"
            />
          </div>
          <div class="p-5">
            <p class="text-xs text-neutral-500 tracking-wider uppercase mb-1.5">${esc(l.role)}</p>
            <h3 class="text-white text-sm font-semibold leading-snug">${esc(l.title)}</h3>
            <p class="text-neutral-500 text-xs mt-2 leading-relaxed">${esc(l.description)}</p>
          </div>
        </div>`).join('');

      // ── Skills ────────────────────────────
      const skillsEl = document.getElementById('skills-list');
      skillsEl.innerHTML = data.skills.map((s, i) => {
        const divider = i > 0 ? '<div class="border-t border-neutral-800"></div>' : '';
        return `${divider}
          <div>
            <p class="text-neutral-500 text-xs tracking-wider uppercase mb-2">${esc(s.category)}</p>
            <p class="text-white font-light">${esc(s.items)}</p>
          </div>`;
      }).join('');

      // ── Footer ────────────────────────────
      document.getElementById('footer-copyright').textContent = data.footer.copyright;

      const footerLinksEl = document.getElementById('footer-links');
      footerLinksEl.innerHTML = hero.links.map(link => {
        const attrs = link.external ? ' target="_blank" rel="noopener"' : '';
        return `<a href="${esc(link.url)}"${attrs} class="hover:text-white transition-colors">${esc(link.label)}</a>`;
      }).join('');

      // ── Re-attach scroll observer ─────────
      initScrollObserver();
    }

    /**
     * IntersectionObserver for fade-in on scroll.
     */
    function initScrollObserver() {
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
            }
          });
        },
        { threshold: 0.15, rootMargin: '0px 0px -40px 0px' }
      );
      document.querySelectorAll('.fade-section').forEach((el) => observer.observe(el));
    }

    // Boot
    renderSite();
  </script>

</body>
</html>
